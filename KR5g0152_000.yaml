body:
  text: 洞眞黄書廣十師曰願分别天地大度八生之法天地六合人六合男乘甲子甲辰甲寅男歸癸亥三合成德更相配以八生爲大度黄書八炁有二十四神人三神人三神尊以三一炁應其炁夫妻結精成神月生一日得癸丑癸卯隂家生炁兩半成一可共度厄消病所求與老子生炁并但行九一旡妄施二日得甲辰天地生炁陽合三日乙巳隂陽大度四日丙午老子白日昇雲開施四炁男女三合女乘甲午甲申甲戌女歸癸巳三合以應十二時各乘十二二十四炁男炁白女炁黄男一女二左三右六先甲寅癸丑還癸酉日男三先癸卯還甲辰乙巳出天門入地户地持天柱爲眞過戊己度元元堅自守子欲求生活歷度三五勿過七九癸亥五五二十五炁癸巳八八六十四炁癸卯九九八十一炁癸酉六六三十六炁癸丑三五炁癸未三五炁甲子五炁施甲午八炁施甲寅九炁施甲辰九炁施甲申六炁施甲戌六炁施道出三五七九天師以漢安元年壬午二年癸未從老子稽首受黄書八卷赤炁三炁九符七符各一玄籙一混成一中章三神籙一口受二十四日乙巳日中歷度二十四卷上下通到二十四己巳日口授升長稚英等宣天地大度皆明知擇其人擇其骨擇其德要死爲效爾乃傳二卷神宜不妄施六甲五行二十四炁九宫八卦隂陽度世消灾保命服食三微虚旡祕經第八勿妄傳東方甲乙木西方庚辛金木畏金甲以女弟乙配西方庚庚乙爲夫妻南方丙丁火北方壬癸水火畏水丙以女弟丁配北方壬壬丁爲夫妻北方壬癸水中央戊己土水畏土壬以女弟癸配中央戊戊癸爲夫妻中央戊己土東方甲乙木土畏木戊以女弟己配東方甲甲己爲夫妻西方庚辛金南方丙丁火金畏火庚以女弟辛配南方丙丙辛爲夫妻春三月東方木王甲女弟乙爲庚妻見家王持西方金還東方生金剋木故榆莢拆是微隂殺夏三月南方火王丙以女弟丁爲壬妻見家王持北方水還南方生水好滅火故殺薺麥秋三月西方金王庚以女弟辛爲丙妻見家王持南方火還西方金生火消金如成器故可穫禾報社冬三月北方水王壬以女弟癸爲中央戊妻見家王持中央土還北方生土好生萬物故冬至之時萬物動於黄泉之中故易言潜龍勿用孝經授神契曰溟涬始互濛澒滋萌此之謂也八卦在天乾爲天一坤爲攝提震爲豐隆巽爲招揺坎爲咸池离爲軒轅艮爲形時兊爲呈時八卦在地乾爲金石坤爲土震爲木巽爲草坎爲水离爲火艮爲山兊爲澤八卦在人乾爲頭坤爲腹震爲足离爲目巽爲鼻亦爲股艮爲手坎爲耳兊爲口八卦初生從九宫起當持四十五籌置子午卯酉中央各九次呼之曰水流歸末分八至丑木落歸本分六至亥金剛火彊分二至未土王四季分四至巳位成二四爲肩六八爲足左三右七戴九履一五在中宫主爲藏腹實巽呼天門從乾得一艮八高舉散三從坤震雷動澤從兊得二坎水不獨六從离得四位成三五齊等若一震陽坎艮各自成位巽隂离兊餘各有位一乾當成坤一復來八九五居中宫卦各居位月生一日一九二日二九三日三九四日四九五日五九六日六九七日七九八日八九九日九九八十一中雨從十日行三五七九十一日行三五七九十二日行三五七九十三日行三五七九十四日行三五七九十五日行三五七九此爲六合部成日月此中不得妄雨雨則别有災愼之慎之從十六日行八八十七日行七八十八日行六八十九日行五八二十日行四八二十一日行三八二十二日行二八二十三日行一八此旬中可一雨天地夫妻隂陽之行其餘七八屬戊己不可妄行各自啓自守結氣兩相含生擇其骨慎勿犯之師曰八卦九宫月生六甲隂陽相配六合八生大度八風二十四雨三五施行七九災厄三五子如施七五災如施三一前二後三八風八炁相配上元一中元二下元三九一生其中八風二十四雨亘一施十日但風炁下胎息千二百炁十六日三炁下如雨天地大度三元炁合二十四日但風炁甲子五炁三五甲申六炁三五甲午八炁三五甲戌六炁三五癸酉隂炁多癸卯陽炁多癸巳隂炁多癸亥陽炁多甲辰九炁三五癸丑陽炁多甲寅九炁三五癸丑陽炁多癸酉癸卯天地大度以隂陽相配合子能明知隂陽六合轉相配偶禁忌三五六合七九六合左三炁右六炁三五七九與二十四神人相應三五者但行左旡上右玄老中太上災疾千二百炁小疾二五七九欲養性保命旡疾病三五大要五炁最爲真七炁九炁疾病災子自三思勿違犯師曰八卦九宫月生六甲隂陽相配六合八生大度八風二十四雨三五施行七九災厄五行男女生禁忌子能施行如玄籙炁混混沌沌黄白之炁能相殺能相生修身念善但共貪生樂活有急爾乃施行恐子不明故下三炁行法從壬午癸未始漢安元年正月十日日中時出八卷玄籙混成圖書宣勑男女莫妄施符契辟除故炁尸注鬼言災病欲度世以赤炁過度戊己白日昇雲龍倒絶去雨卧兩手過頭三從故玉室出去復還八幽解十六結思八炁令炁解生炁者乃施父生泰玄府母生泰微府父生丙寅母生丙申天地未立分别黄白共施九九八十一炁炁如二兩半成一左炁上一右玄老三中太上三九九八十一故令男女先二後三即是三五子共三思中章腹目眀三生三起爲三生三卧爲三死人之明以以炁爲保勿違犯師曰三五位成七九灾除三一先行二四九一生炁炁如三合成德思之勿妄施道以月生一日至九日各共思玄元始炁在頭目頭念八卦在人身二十四神與三五七九知之身可度矣道以月旬之後其數三五七九從十日盡十五日日行三五七九日此爲天地人之六合日月當明不得妄雨可消灾雨則傷敗枯根糜子不明三五之法七九之施爲欲妄施恐子如魚之失水人之失炁雨有害愼之愼之道以月十六日施八八至一八此旬中可一雨下弦屬戊己七八可風不雨二十八日當止子不能共施三五但行三五七九與二十四神相應不與左旡上右玄老中太上相應三一者三官正炁前一後二者上元中元也兩共却卧兩足相距出入極望元元三訖過度戊己嬰兒胎息千二百炁身被灾疾不復除爾乃思上下丹田中神二十四炁亦共思之三五之神亦共思之男左思女右思勿妄傳擇其人愼之愼之道以十二月相配隂陽大度八生之法玄炁來下始炁來上神炁男女各名其神可共歷度疾病之災受眞四字名號八字配炁道出㝠㝠入窈窈三五炁當正身得神仙帝王安寧萬不失一命可得全男三炁女五炁男十二炁女十二炁十二時相配各自堅其神男神王文卿周左右松女神衛上卿周史公來如此心自明勿違犯道生六合當欲過五厄歷度諸灾消去疫炁口舌疾病不止先思甲子諸君之神道隨日名其神神爲厄者上天曹除三官考逮不念其神章上言誓歷年日月不解出入行來男官乘六十神加令得隂神日可質使之加令得陽神日亦可質使陽神五日在隂家隂神五日在陽家以故兩相含今日甲子日思神還六戎十神爲人走使今日甲午日思其神還九夷十神爲人走使故置子午將六癸神之所歸人能明六癸舉事可過度男女各自保其神施炁不得妄行中有不死道帝自三思日道生未然先具甲子諸神次具二十四神正月一日隨日名號至十二月男女神炁同其一失一者其命不全故置神位隨月施行不可失之錯互他呼召不爲人使出入若治病疫氣皆宜自啓天地水三官與日神併力佐助道人王甲施行三五七九子能以受吾眞言要語當共明師口訣㫖語上下九宫八卦符契圖書籙籍以漢安元年七月七日日中時太上老君授與張陵口要長生度世尸解白日昇天子孫係世過度諸災道陵以二年歲在癸未正月七日日中時授與趙升王長王稚王英等施行黄書契令九宫禁忌知男女官神所治第八卷要言出其中升等授三夫人於莊山北望治分别卷契先授赤炁口訣天地六合三五正行七九配炁男女生各隨其神長短衣服皆共思之令神各自守旡令錯互人始生先念精神如念腦髓生骨完堅彊羅綱解十六結其神散手過頭上止勿妄傳愼之愼之師曰天地九夷八蠻六戎五狄天地水三官考召六質二十四官君天師女師係師三師君將三天正炁大赤天一清微天一禹餘天一子能明三炁三五者可共度厄脫年命除去疫病要言口傳勿文按男官二十四炁女官二十四炁神籙玄籙混成中章不可不擇其人爾乃傳子能明此九九可共消災散禍中有服食三微不知老歷度三炁甲辰癸卯始此爲真甲午乙未丙申六十之歲恐子左驅除惡逆不復乆事可守一不可三更甲午道正月七日日中時下洞真黄書
